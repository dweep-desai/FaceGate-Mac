name: FaceGuard
options:
  bundleIdPrefix: com.dweep
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: com.dweep.FaceGuard
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_FILE: FaceGuard/Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: FaceGuard.entitlements
    PRODUCT_NAME: FaceGuard

targets:
  FaceGuard:
    type: application
    platform: macOS
    sources:
      - path: FaceGuard
        excludes:
          - "**/*.mlpackage"
    resources:
      - path: FaceGuard/Resources/Assets.xcassets
      - path: FaceGuard/ML
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: FaceGuard/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: FaceGuard.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
    entitlements:
      path: FaceGuard.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.camera: true
